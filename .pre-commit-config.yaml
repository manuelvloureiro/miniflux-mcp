repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.407
    hooks:
      - id: pyright

  - repo: local
    hooks:
      - id: unit-tests
        name: Run unit tests with coverage
        entry: uv run pytest tests/ --tb=short --cov --cov-report=term-missing --cov-fail-under=80
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
